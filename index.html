<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sommerfest Kasse - Premium Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@400;600;900&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --fest-orange: #f97316;
        }

        body { 
            font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
        }

        .apple-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-button:active {
            transform: scale(0.94);
        }

        /* Success Animation Classes */
        .checkmark-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }

        .checkmark {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: block;
            stroke-width: 2;
            stroke: #fff;
            stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px #22c55e;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: #22c55e;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 100px #22c55e; } }

        /* General Animations */
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .number-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        .animate-float { animation: float 5s ease-in-out infinite; }

        .bg-mesh {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, hsla(25,100%,96%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(22,100%,98%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(30,100%,95%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="text-slate-900 bg-mesh">
    <div id="root"></div>

    <script type="text/babel">
       const firebaseConfig = {
  apiKey: "AIzaSyCTMGml_KKj1wjmtzTJNubWyMvSaPU3cB8",
  authDomain: "sommerfest-kasse.firebaseapp.com",
  projectId: "sommerfest-kasse",
  storageBucket: "sommerfest-kasse.firebasestorage.app",
  messagingSenderId: "899854905140",
  appId: "1:899854905140:web:94be886a048356c7fb3f61"
};

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const { useState, useEffect, useMemo, useRef } = React;
        const SYNC_CHANNEL_NAME = 'sommerfest_kasse_sync_final';

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(amount);
        };

        const Icon = ({ name, color = "currentColor", size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/([A-Z])/g, '-$1').toLowerCase();
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', iconName);
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { stroke: color, 'stroke-width': 2, width: size, height: size },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, color, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        // --- COMPONENTS ---

        function SettingsModal({ tokenPrice, onSave, onClose }) {
            const [localPrice, setLocalPrice] = useState(tokenPrice.toString().replace('.', ','));
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm">
                    <div className="glass-card w-full max-w-md rounded-[2.5rem] p-8 flex flex-col shadow-2xl border-white pop-in">
                        <h2 className="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                            <Icon name="Settings" color="#f97316" /> Einstellungen
                        </h2>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Markenwert (€)</label>
                                <input 
                                    type="text" 
                                    value={localPrice}
                                    onChange={(e) => setLocalPrice(e.target.value)}
                                    className="w-full bg-slate-50 p-4 rounded-2xl text-2xl font-black outline-none border-2 border-transparent focus:border-orange-400 transition-all text-orange-600"
                                />
                            </div>
                        </div>
                        <div className="mt-8 flex gap-3">
                            <button onClick={onClose} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-500 apple-button">Abbrechen</button>
                            <button 
                                onClick={() => {
                                    const p = parseFloat(localPrice.replace(',', '.'));
                                    if (!isNaN(p)) onSave(p);
                                }}
                                className="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg shadow-orange-200 apple-button"
                            >
                                Speichern
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function JournalModal({ journal, onDelete, onClose }) {
            const stats = useMemo(() => {
                let sales = 0, revenue = 0;
                journal.forEach(item => { 
                    sales += Number(item.quantity) || 0; 
                    revenue += Number(item.amount) || 0; 
                });
                return { sales, revenue };
            }, [journal]);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm">
                    <div className="glass-card w-full max-w-4xl max-h-[85vh] rounded-[2.5rem] flex flex-col overflow-hidden shadow-2xl border-white pop-in">
                        <div className="flex justify-between items-center p-8 border-b border-orange-50 bg-white/50">
                            <h2 className="text-3xl font-bold tracking-tight text-slate-800">Journal</h2>
                            <button onClick={onClose} className="p-3 bg-slate-100 rounded-full apple-button"><Icon name="X" color="#64748b" /></button>
                        </div>
                        <div className="grid grid-cols-2 gap-6 p-8 bg-slate-50/30">
                            <div className="glass-card p-6 rounded-3xl text-center bg-white shadow-sm border-white">
                                <p className="text-sm font-semibold text-slate-400 uppercase tracking-widest">Marken Gesamt</p>
                                <p className="text-4xl font-black text-slate-800">{stats.sales}</p>
                            </div>
                            <div className="glass-card p-6 rounded-3xl text-center bg-white shadow-sm border-white">
                                <p className="text-sm font-semibold text-orange-500 uppercase tracking-widest">Kassenstand</p>
                                <p className="text-4xl font-black text-orange-500">{formatCurrency(stats.revenue)}</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 pt-0 bg-white/20">
                            <table className="w-full">
                                <thead className="sticky top-0 bg-white/80 backdrop-blur-md text-xs font-bold text-slate-400 uppercase tracking-tighter z-10 border-b border-slate-50">
                                    <tr>
                                        <th className="py-4 text-left">Zeit</th>
                                        <th className="py-4 text-left">Typ</th>
                                        <th className="py-4 text-right">Menge</th>
                                        <th className="py-4 text-right">Summe</th>
                                        <th className="py-4 text-right">Aktion</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {journal.map(item => (
                                        <tr key={item.id} className="group transition-colors hover:bg-white/40">
                                            <td className="py-5 font-medium text-slate-500">{new Date(item.timestamp).toLocaleTimeString()}</td>
                                            <td className="py-5">
                                                <span className={`px-4 py-1.5 rounded-full text-xs font-bold ${item.type === 'sale' ? 'bg-orange-50 text-orange-600' : 'bg-rose-50 text-rose-600'}`}>
                                                    {item.type === 'sale' ? 'Verkauf' : 'Retoure'}
                                                </span>
                                            </td>
                                            <td className="py-5 text-right font-semibold">{item.quantity}</td>
                                            <td className="py-5 text-right font-black">{formatCurrency(item.amount)}</td>
                                            <td className="py-5 text-right">
                                                <button onClick={() => onDelete(item.id)} className="text-slate-200 hover:text-rose-500 transition-colors p-2">
                                                    <Icon name="Trash2" size={18} />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // --- CASHIER APP ---

        function CashierApp() {
            const [user, setUser] = useState(null);
            const [tokenPrice, setTokenPrice] = useState(0.50);
            const [quantity, setQuantity] = useState(0);
            const [givenCashStr, setGivenCashStr] = useState("");
            const [journal, setJournal] = useState([]);
            const [showJournal, setShowJournal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const channelRef = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                channelRef.current = new BroadcastChannel(SYNC_CHANNEL_NAME);
                return () => {
                    unsubscribe();
                    if (channelRef.current) channelRef.current.close();
                };
            }, []);

            const getJournalCol = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('journal');
            const getSettingsDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('settings');

            useEffect(() => {
                if (!user) return;
                const unsubJournal = getJournalCol().onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setJournal(data.sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || "")));
                }, (err) => console.error("Sync error:", err));
                const unsubSettings = getSettingsDoc().onSnapshot((doc) => {
                    if (doc.exists && doc.data().tokenPrice) setTokenPrice(doc.data().tokenPrice);
                });
                return () => { unsubJournal(); unsubSettings(); };
            }, [user]);

            const total = quantity * tokenPrice;
            const given = parseFloat(givenCashStr.replace(',', '.')) || 0;
            const change = given > 0 ? Math.max(0, given - total) : 0;

            useEffect(() => {
                if (channelRef.current) {
                    channelRef.current.postMessage({
                        type: 'UPDATE',
                        payload: { quantity, total, status: quantity > 0 ? 'active' : 'idle' }
                    });
                }
            }, [quantity, total]);

            const handleCheckout = async (type = 'sale') => {
                if (!user || quantity === 0) return;
                const amount = type === 'sale' ? total : -total;
                const qty = type === 'sale' ? quantity : -quantity;
                const entry = { type, quantity: qty, amount, timestamp: new Date().toISOString() };

                try {
                    await getJournalCol().add(entry);
                    channelRef.current.postMessage({ 
                        type: 'UPDATE', 
                        payload: { quantity: 0, total: 0, status: 'success', change: type === 'sale' ? change : 0 } 
                    });
                    setQuantity(0); setGivenCashStr("");
                    setTimeout(() => channelRef.current.postMessage({ type: 'UPDATE', payload: { status: 'idle' } }), 4000);
                } catch (e) { console.error("Checkout error:", e); }
            };

            return (
                <div className="h-screen w-screen p-4 md:p-8 flex flex-col gap-4 md:gap-8 overflow-hidden">
                    <header className="flex justify-between items-center px-4 shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 md:w-12 md:h-12 glass-card rounded-2xl flex items-center justify-center animate-float shadow-sm border-white">
                                <Icon name="Sun" color="#f97316" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl md:text-2xl font-black tracking-tight text-slate-800">Sommer-Kasse</h1>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => window.open('?view=customer', '_blank')} className="glass-card p-3 rounded-xl apple-button hover:bg-white"><Icon name="ScreenShare" size={20} color="#3b82f6" /></button>
                            <button onClick={() => setShowJournal(true)} className="glass-card p-3 rounded-xl apple-button hover:bg-white"><Icon name="History" size={20} color="#f97316" /></button>
                            <button onClick={() => setShowSettings(true)} className="glass-card p-3 rounded-xl apple-button hover:bg-white"><Icon name="Settings" size={20} color="#64748b" /></button>
                        </div>
                    </header>

                    <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-8 min-h-0">
                        {/* Control Section */}
                        <section className="lg:col-span-7 glass-card rounded-[2.5rem] md:rounded-[3.5rem] p-6 md:p-10 flex flex-col items-center justify-center relative overflow-hidden bg-white/60 shadow-xl border-white">
                            <div className="text-8xl md:text-9xl lg:text-[11rem] font-black tracking-tighter leading-none mb-2 tabular-nums text-slate-900 pop-in">
                                {quantity}
                            </div>
                            <p className="text-sm md:text-xl font-bold text-slate-300 uppercase tracking-[0.4em] mb-6 md:mb-12">Wertmarken</p>
                            
                            <div className="flex gap-4 md:gap-8 items-center mb-6 md:mb-12">
                                <button onClick={() => setQuantity(q => Math.max(0, q-1))} className="w-16 h-16 md:w-20 md:h-20 glass-card rounded-full flex items-center justify-center apple-button border-slate-100 shadow-sm">
                                    <Icon name="Minus" size={28} color="#f97316" />
                                </button>
                                <div className="glass-card px-10 md:px-14 py-4 md:py-6 rounded-[1.5rem] md:rounded-[2.5rem] border-white bg-white shadow-lg">
                                    <span className="text-3xl md:text-5xl font-black text-orange-500 tabular-nums">{formatCurrency(total)}</span>
                                </div>
                                <button onClick={() => setQuantity(q => q+1)} className="w-16 h-16 md:w-20 md:h-20 bg-orange-500 text-white rounded-full flex items-center justify-center apple-button shadow-xl shadow-orange-200">
                                    <Icon name="Plus" size={28} />
                                </button>
                            </div>

                            <div className="grid grid-cols-3 gap-2 md:gap-4 w-full max-w-sm">
                                {[5, 10, 20].map(n => (
                                    <button key={n} onClick={() => setQuantity(q => q+n)} className="glass-card py-4 rounded-2xl font-black text-lg apple-button hover:bg-slate-900 hover:text-white transition-all border-white">
                                        +{n}
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Payment Section */}
                        <section className="lg:col-span-5 glass-card rounded-[2.5rem] md:rounded-[3.5rem] p-6 md:p-10 flex flex-col shadow-xl min-h-0 bg-white border-white">
                            <div className="grid grid-cols-2 gap-3 mb-6 shrink-0">
                                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                    <span className="text-[10px] block font-black text-slate-400 uppercase mb-1 tracking-widest">Gegeben</span>
                                    <span className="text-xl md:text-2xl font-black tabular-nums text-slate-700">{formatCurrency(given)}</span>
                                </div>
                                <div className="bg-green-50 p-4 rounded-2xl border border-green-100">
                                    <span className="text-[10px] block font-black text-green-600 uppercase mb-1 tracking-widest">Rückgeld</span>
                                    <span className="text-xl md:text-2xl font-black text-green-600 tabular-nums">{formatCurrency(change)}</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-4 gap-2 flex-1 min-h-0">
                                {['1','2','3','5€','4','5','6','10€','7','8','9','20€',',','0','C','50€'].map((k, idx) => (
                                    <button key={idx} onClick={() => {
                                        if (k === 'C') setGivenCashStr("");
                                        else if (k.includes('€')) setGivenCashStr(k.replace('€',''));
                                        else setGivenCashStr(s => s + k);
                                    }} className={`rounded-2xl font-bold text-xl apple-button transition-all flex items-center justify-center ${k === 'C' ? 'bg-rose-50 text-rose-500' : 'glass-card hover:bg-slate-50 border-slate-50 shadow-sm'}`}>
                                        {k}
                                    </button>
                                ))}
                            </div>

                            <div className="mt-8 flex flex-col gap-3 shrink-0">
                                <button 
                                    onClick={() => handleCheckout('sale')} 
                                    disabled={quantity === 0} 
                                    className="w-full bg-slate-900 text-white py-6 md:py-8 rounded-[2rem] font-black text-xl apple-button shadow-2xl disabled:opacity-10"
                                >
                                    ABSCHLIESSEN
                                </button>
                                <button 
                                    onClick={() => handleCheckout('return')} 
                                    disabled={quantity === 0} 
                                    className="w-full text-slate-300 py-3 rounded-xl font-bold text-xs apple-button hover:text-rose-400"
                                >
                                    RETOURE / STORNO
                                </button>
                            </div>
                        </section>
                    </main>

                    {showJournal && <JournalModal journal={journal} onDelete={(id) => getJournalCol().doc(id).delete()} onClose={() => setShowJournal(false)} />}
                    {showSettings && <SettingsModal tokenPrice={tokenPrice} onSave={(p) => getSettingsDoc().set({tokenPrice: p})} onClose={() => setShowSettings(false)} />}
                </div>
            );
        }

        // --- CUSTOMER VIEW ---

        function CustomerView() {
            const [state, setState] = useState({ quantity: 0, total: 0, status: 'idle', change: 0 });
            useEffect(() => {
                const channel = new BroadcastChannel(SYNC_CHANNEL_NAME);
                channel.onmessage = (e) => setState(e.data.payload);
                return () => channel.close();
            }, []);

            if (state.status === 'success') {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center p-8 bg-mesh">
                        <div className="flex flex-col items-center text-center pop-in">
                            <div className="checkmark-wrapper">
                                <svg className="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                                    <circle className="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                                    <path className="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                                </svg>
                            </div>
                            <h1 className="text-5xl md:text-6xl font-black text-slate-800 mb-2 tracking-tighter">Vielen Dank!</h1>
                            <p className="text-xl text-slate-400 font-medium mb-10">Viel Spaß auf dem Sommerfest.</p>
                            
                            {state.change > 0 && (
                                <div className="glass-card p-8 rounded-[2.5rem] border-white shadow-xl bg-white/80 slide-up">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Dein Rückgeld</p>
                                    <p className="text-6xl font-black text-green-600 tabular-nums leading-none">{formatCurrency(state.change)}</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (state.status === 'active') {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center p-6 bg-mesh">
                        <div className="w-full max-w-lg glass-card rounded-[3rem] flex flex-col shadow-2xl border-white bg-white/90 p-10 pop-in">
                            <div className="flex flex-col items-center justify-center">
                                <div className="flex items-center gap-3 mb-4">
                                    <Icon name="Ticket" size={20} color="#f97316" className="opacity-30" />
                                    <span className="text-xs font-bold text-slate-300 uppercase tracking-[0.3em]">Deine Bestellung</span>
                                </div>
                                <span className="text-[11rem] font-black leading-none text-slate-900 tracking-tighter animate-float">{state.quantity}</span>
                                <span className="text-lg text-orange-500 font-black uppercase tracking-[0.3em] mb-8">Wertmarken</span>
                                
                                <div className="w-full h-px bg-slate-100 mb-8"></div>
                                
                                <div className="flex flex-col items-center">
                                    <span className="text-xs font-bold text-slate-300 uppercase tracking-widest mb-1">Zu zahlen</span>
                                    <span className="text-6xl font-black text-slate-900 tabular-nums">{formatCurrency(state.total)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-mesh flex flex-col items-center justify-center text-center p-10">
                    <div className="mb-8 p-6 glass-card rounded-[2.5rem] bg-white border-white shadow-xl animate-float">
                        <Icon name="Sun" size={60} color="#f97316" className="md:w-32 md:h-32" />
                    </div>
                    <h1 className="text-6xl md:text-8xl font-black tracking-tighter leading-none text-slate-900 mb-4">Sommerfest</h1>
                    <p className="text-lg md:text-2xl font-medium tracking-[0.5rem] text-slate-300 uppercase">Willkommen am Stand</p>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState(null);
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                setView(params.get('view') === 'customer' ? 'customer' : 'cashier');
            }, []);
            if (!view) return null;
            return view === 'customer' ? <CustomerView /> : <CashierApp />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
