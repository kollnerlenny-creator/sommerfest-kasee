<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sommerfest Kasse - Cloud Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@400;600;900&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.6);
            --fest-orange: #f97316;
            --success-green: #22c55e;
            --return-red: #ef4444;
        }

        body { 
            font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
        }

        .apple-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-button:active {
            transform: scale(0.94);
        }

        /* --- Animations-Fix --- */
        .success-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            animation: circlePop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
        }

        .check-icon-svg {
            width: 70px;
            height: 70px;
            stroke: white;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: checkDraw 0.6s ease-out 0.5s forwards;
        }

        @keyframes circlePop {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes checkDraw {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }

        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .slide-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .bg-mesh {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, hsla(25,100%,96%,1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(22,100%,98%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(30,100%,95%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="text-slate-900 bg-mesh">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
  apiKey: "AIzaSyCTMGml_KKj1wjmtzTJNubWyMvSaPU3cB8",
  authDomain: "sommerfest-kasse.firebaseapp.com",
  projectId: "sommerfest-kasse",
  storageBucket: "sommerfest-kasse.firebasestorage.app",
  messagingSenderId: "899854905140",
  appId: "1:899854905140:web:94be886a048356c7fb3f61"
};
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const { useState, useEffect, useMemo, useRef } = React;

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(amount);
        };

        const Icon = ({ name, color = "currentColor", size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/([A-Z])/g, '-$1').toLowerCase();
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', iconName);
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { stroke: color, 'stroke-width': 2, width: size, height: size },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, color, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const getJournalCol = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('journal');
        const getSettingsDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('settings');
        const getDisplayDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('display_state');

        // --- COMPONENTS ---

        function SettingsModal({ tokenPrice, onSave, onClose }) {
            const [localPrice, setLocalPrice] = useState(tokenPrice.toString().replace('.', ','));
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm">
                    <div className="glass-card w-full max-w-md rounded-[2.5rem] p-8 flex flex-col shadow-2xl border-white pop-in">
                        <h2 className="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2">
                            <Icon name="Settings" color="#f97316" /> Einstellungen
                        </h2>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Markenwert (€)</label>
                            <input 
                                type="text" 
                                value={localPrice}
                                onChange={(e) => setLocalPrice(e.target.value)}
                                className="w-full bg-slate-50 p-4 rounded-2xl text-2xl font-black outline-none border-2 border-transparent focus:border-orange-400 transition-all text-orange-600"
                            />
                        </div>
                        <div className="mt-8 flex gap-3">
                            <button onClick={onClose} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-500 apple-button">Abbrechen</button>
                            <button onClick={() => onSave(parseFloat(localPrice.replace(',', '.')))} className="flex-1 py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg apple-button">Speichern</button>
                        </div>
                    </div>
                </div>
            );
        }

        function JournalModal({ journal, onDelete, onClose }) {
            const stats = useMemo(() => {
                let sales = 0, revenue = 0;
                journal.forEach(item => { 
                    sales += Number(item.quantity) || 0; 
                    revenue += Number(item.amount) || 0; 
                });
                return { sales, revenue };
            }, [journal]);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/20 backdrop-blur-sm">
                    <div className="glass-card w-full max-w-4xl max-h-[85vh] rounded-[2.5rem] flex flex-col overflow-hidden shadow-2xl border-white pop-in">
                        <div className="flex justify-between items-center p-8 border-b border-orange-50 bg-white/50">
                            <h2 className="text-3xl font-bold tracking-tight text-slate-800">Journal</h2>
                            <button onClick={onClose} className="p-3 bg-slate-100 rounded-full apple-button"><Icon name="X" color="#64748b" /></button>
                        </div>
                        <div className="grid grid-cols-2 gap-6 p-8 bg-slate-50/30">
                            <div className="glass-card p-6 rounded-3xl text-center bg-white border-white">
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Marken Gesamt</p>
                                <p className="text-4xl font-black text-slate-800">{stats.sales}</p>
                            </div>
                            <div className="glass-card p-6 rounded-3xl text-center bg-white border-white">
                                <p className="text-xs font-bold text-orange-500 uppercase tracking-widest">Kassenstand</p>
                                <p className="text-4xl font-black text-orange-500">{formatCurrency(stats.revenue)}</p>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 pt-0">
                            <table className="w-full">
                                <thead className="sticky top-0 bg-white/95 text-xs font-bold text-slate-400 uppercase tracking-tighter z-10">
                                    <tr>
                                        <th className="py-4 text-left">Zeit</th>
                                        <th className="py-4 text-left">Typ</th>
                                        <th className="py-4 text-right">Menge</th>
                                        <th className="py-4 text-right">Summe</th>
                                        <th className="py-4 text-right">Aktion</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {journal.map(item => (
                                        <tr key={item.id} className="group">
                                            <td className="py-5 font-medium text-slate-500">{new Date(item.timestamp).toLocaleTimeString()}</td>
                                            <td className="py-5">
                                                <span className={`px-4 py-1.5 rounded-full text-[10px] font-bold ${item.type === 'sale' ? 'bg-orange-50 text-orange-600' : 'bg-rose-50 text-rose-600'}`}>
                                                    {item.type === 'sale' ? 'VERKAUF' : 'RETOURE'}
                                                </span>
                                            </td>
                                            <td className="py-5 text-right font-semibold">{item.quantity}</td>
                                            <td className="py-5 text-right font-black">{formatCurrency(item.amount)}</td>
                                            <td className="py-5 text-right">
                                                <button onClick={() => onDelete(item.id)} className="text-slate-200 hover:text-rose-500 p-2 transition-colors"><Icon name="Trash2" size={16} /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // --- CASHIER APP ---

        function CashierApp() {
            const [user, setUser] = useState(null);
            const [tokenPrice, setTokenPrice] = useState(0.50);
            const [quantity, setQuantity] = useState(0);
            const [givenCashStr, setGivenCashStr] = useState("");
            const [journal, setJournal] = useState([]);
            const [showJournal, setShowJournal] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const autoResetTimer = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubJournal = getJournalCol().onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setJournal(data.sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || "")));
                });
                const unsubSettings = getSettingsDoc().onSnapshot((doc) => {
                    if (doc.exists && doc.data().tokenPrice) setTokenPrice(doc.data().tokenPrice);
                });
                return () => { unsubJournal(); unsubSettings(); };
            }, [user]);

            const total = quantity * tokenPrice;
            const given = parseFloat(givenCashStr.replace(',', '.')) || 0;
            const change = given > 0 ? Math.max(0, given - total) : 0;

            // Sync current state (not success state)
            useEffect(() => {
                if (!user || quantity < 0) return;
                const sync = async () => {
                    try {
                        // Wenn wir gerade tippen, lösche eventuelle Reset-Timer
                        if (autoResetTimer.current) clearTimeout(autoResetTimer.current);
                        
                        await getDisplayDoc().set({
                            quantity, 
                            total, 
                            given, 
                            status: quantity > 0 ? 'active' : 'idle',
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    } catch (e) { console.error("Sync error:", e); }
                };
                sync();
            }, [quantity, total, given, user]);

            const handleCheckout = async (type = 'sale') => {
                if (!user || quantity === 0) return;
                
                const amount = type === 'sale' ? total : -total;
                const qty = type === 'sale' ? quantity : -quantity;
                const entry = { type, quantity: qty, amount, timestamp: new Date().toISOString() };

                try {
                    // 1. Speichere Journal-Eintrag
                    await getJournalCol().add(entry);
                    
                    // 2. Setze Erfolg-Status (Wird auf Kundendisplay angezeigt)
                    await getDisplayDoc().set({ 
                        status: 'success', 
                        type: type,
                        quantity: quantity,
                        total: total,
                        change: type === 'sale' ? change : 0, 
                        given: given > 0 ? given : total,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // 3. Lokales Interface leeren
                    setQuantity(0); 
                    setGivenCashStr("");

                    // 4. Timer für Reset (8 Sekunden anzeigen)
                    if (autoResetTimer.current) clearTimeout(autoResetTimer.current);
                    autoResetTimer.current = setTimeout(async () => {
                        await getDisplayDoc().set({ status: 'idle', quantity: 0, total: 0, given: 0 });
                    }, 8000); 

                } catch (e) { console.error("Checkout error:", e); }
            };

            return (
                <div className="h-screen w-screen p-4 md:p-8 flex flex-col gap-4 overflow-hidden">
                    <header className="flex justify-between items-center px-4 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-100">
                                <Icon name="Sun" color="white" size={20} />
                            </div>
                            <h1 className="text-xl font-black tracking-tight text-slate-800">Sommer-Kasse</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => window.open(window.location.href + (window.location.search ? '&view=customer' : '?view=customer'), '_blank')} className="glass-card p-3 rounded-xl apple-button hover:bg-white"><Icon name="ScreenShare" size={18} color="#3b82f6" /></button>
                            <button onClick={() => setShowJournal(true)} className="glass-card p-3 rounded-xl apple-button hover:bg-white"><Icon name="History" size={18} color="#f97316" /></button>
                            <button onClick={() => setShowSettings(true)} className="glass-card p-3 rounded-xl apple-button hover:bg-white"><Icon name="Settings" size={18} color="#64748b" /></button>
                        </div>
                    </header>

                    <main className="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 min-h-0">
                        {/* Left: Token Input */}
                        <section className="lg:col-span-7 glass-card rounded-[2.5rem] p-8 flex flex-col items-center justify-center relative bg-white/40 border-white shadow-xl">
                            <div className="text-center z-10">
                                <div className="text-[9rem] font-black tracking-tighter leading-none mb-2 tabular-nums text-slate-900 pop-in">{quantity}</div>
                                <p className="text-sm font-bold text-slate-300 uppercase tracking-[0.4em] mb-10">Wertmarken</p>
                                
                                <div className="flex gap-6 items-center mb-10">
                                    <button onClick={() => setQuantity(q => Math.max(0, q-1))} className="w-16 h-16 glass-card rounded-full flex items-center justify-center apple-button"><Icon name="Minus" color="#f97316" /></button>
                                    <div className="glass-card px-10 py-5 rounded-[1.5rem] bg-white shadow-lg"><span className="text-4xl font-black text-orange-500">{formatCurrency(total)}</span></div>
                                    <button onClick={() => setQuantity(q => q+1)} className="w-16 h-16 bg-orange-500 text-white rounded-full flex items-center justify-center apple-button shadow-xl shadow-orange-100"><Icon name="Plus" /></button>
                                </div>

                                <div className="grid grid-cols-3 gap-3 w-full max-w-sm">
                                    {[5, 10, 20].map(n => (
                                        <button key={n} onClick={() => setQuantity(q => q+n)} className="glass-card py-4 rounded-2xl font-black apple-button hover:bg-slate-900 hover:text-white border-white">+{n}</button>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Right: Payment Input */}
                        <section className="lg:col-span-5 glass-card rounded-[2.5rem] p-8 flex flex-col shadow-xl bg-white border-white">
                            <div className="grid grid-cols-2 gap-4 mb-8 shrink-0">
                                <div className="bg-slate-50 p-5 rounded-2xl">
                                    <span className="text-[10px] block font-black text-slate-400 uppercase mb-1">Gegeben</span>
                                    <span className="text-2xl font-black tabular-nums text-slate-700">{formatCurrency(given)}</span>
                                </div>
                                <div className="bg-green-50 p-5 rounded-2xl">
                                    <span className="text-[10px] block font-black text-green-600 uppercase mb-1">Rückgeld</span>
                                    <span className="text-2xl font-black text-green-600 tabular-nums">{formatCurrency(change)}</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-4 gap-2 flex-1 min-h-0">
                                {['1','2','3','5€','4','5','6','10€','7','8','9','20€',',','0','C','50€'].map((k, idx) => (
                                    <button key={idx} onClick={() => {
                                        if (k === 'C') setGivenCashStr("");
                                        else if (k.includes('€')) setGivenCashStr(k.replace('€',''));
                                        else setGivenCashStr(s => s + k);
                                    }} className={`rounded-2xl font-bold text-xl apple-button transition-all flex items-center justify-center ${k === 'C' ? 'bg-rose-50 text-rose-500' : 'glass-card border-slate-50 shadow-sm'}`}>
                                        {k}
                                    </button>
                                ))}
                            </div>

                            <div className="mt-8 flex gap-3 shrink-0">
                                <button onClick={() => handleCheckout('return')} disabled={quantity === 0} className="flex-1 bg-rose-50 text-rose-500 py-6 rounded-3xl font-bold text-xs apple-button border border-rose-100 disabled:opacity-30">RETOURE</button>
                                <button onClick={() => handleCheckout('sale')} disabled={quantity === 0} className="flex-[2] bg-slate-900 text-white py-6 rounded-3xl font-black text-xl apple-button shadow-2xl disabled:opacity-10">BEZAHLT</button>
                            </div>
                        </section>
                    </main>

                    {showJournal && <JournalModal journal={journal} onDelete={(id) => getJournalCol().doc(id).delete()} onClose={() => setShowJournal(false)} />}
                    {showSettings && <SettingsModal tokenPrice={tokenPrice} onSave={(p) => getSettingsDoc().set({tokenPrice: p})} onClose={() => setShowSettings(false)} />}
                </div>
            );
        }

        // --- CUSTOMER VIEW ---

        const SuccessScreen = ({ state }) => {
            const isReturn = state.type === 'return';
            return (
                <div className="h-screen w-screen flex flex-col items-center justify-center p-12 bg-mesh overflow-hidden text-center">
                    <div className="success-circle" style={{backgroundColor: isReturn ? '#ef4444' : '#22c55e'}}>
                        <svg className="check-icon-svg" viewBox="0 0 50 50">
                            {isReturn ? (
                                <path d="M15 15L35 35M35 15L15 35" />
                            ) : (
                                <path d="M10 25L20 35L40 15" />
                            )}
                        </svg>
                    </div>
                    
                    <h1 className="text-7xl md:text-9xl font-black text-slate-800 mb-4 tracking-tighter pop-in" style={{animationDelay: '0.4s'}}>
                        {isReturn ? 'Storno' : 'Zahlung OK'}
                    </h1>
                    <p className="text-2xl md:text-3xl text-slate-400 font-medium mb-16 slide-up" style={{animationDelay: '0.6s'}}>
                        {isReturn ? 'Der Vorgang wurde rückgängig gemacht.' : 'Viel Spaß beim Sommerfest!'}
                    </p>
                    
                    {!isReturn && (
                        <div className="flex flex-col md:flex-row gap-6 slide-up" style={{animationDelay: '0.8s'}}>
                            <div className="glass-card p-10 rounded-[2.5rem] border-white shadow-lg bg-white/50 min-w-[250px]">
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Gegeben</p>
                                <p className="text-4xl font-black text-slate-700">{formatCurrency(state.given)}</p>
                            </div>
                            {state.change > 0 && (
                                <div className="glass-card p-10 px-16 rounded-[3rem] border-white shadow-2xl bg-white min-w-[320px]">
                                    <p className="text-xs font-bold text-green-500 uppercase tracking-widest mb-2">Ihr Rückgeld</p>
                                    <p className="text-6xl font-black text-green-600 tabular-nums">{formatCurrency(state.change)}</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        function CustomerView() {
            const [state, setState] = useState({ status: 'idle' });
            const [user, setUser] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = getDisplayDoc().onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        // Nur updaten, wenn es eine relevante Änderung gibt
                        setState(data);
                    }
                });
                return () => unsub();
            }, [user]);

            if (state.status === 'success') {
                return <SuccessScreen state={state} />;
            }

            if (state.status === 'active') {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center p-10 bg-mesh">
                        <div className="w-full max-w-2xl glass-card rounded-[4rem] flex flex-col shadow-2xl border-white bg-white/90 p-16 pop-in">
                            <div className="text-center relative z-10">
                                <span className="text-sm font-bold text-slate-300 uppercase tracking-[0.4em] mb-6 block">Ihre Bestellung</span>
                                <div className="mb-4">
                                    <span className="text-[14rem] md:text-[18rem] font-black leading-none text-slate-900 tracking-tighter block">{state.quantity}</span>
                                </div>
                                <span className="text-2xl md:text-3xl text-orange-500 font-black uppercase tracking-[0.5em] mb-12 block">Wertmarken</span>
                                
                                <div className="w-full h-px bg-slate-100 mb-12"></div>
                                
                                <div className="grid grid-cols-2 gap-12 w-full">
                                    <div className="flex flex-col items-center border-r border-slate-100">
                                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Gesamtsumme</span>
                                        <span className="text-5xl md:text-6xl font-black text-slate-900 tabular-nums">{formatCurrency(state.total)}</span>
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Gegeben</span>
                                        <span className="text-5xl md:text-6xl font-black text-blue-600 tabular-nums">{state.given > 0 ? formatCurrency(state.given) : "—"}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-mesh flex flex-col items-center justify-center text-center p-10">
                    <div className="mb-12 p-12 glass-card rounded-[4rem] bg-white shadow-2xl">
                        <Icon name="Sun" size={120} color="#f97316" className="md:w-60 md:h-60" />
                    </div>
                    <h1 className="text-[8rem] md:text-[12rem] font-black tracking-tighter leading-none text-slate-900 mb-6 pop-in">Sommerfest</h1>
                    <p className="text-2xl md:text-4xl font-medium tracking-[0.8rem] text-slate-300 uppercase slide-up">Willkommen am Stand</p>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState(null);
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                setView(params.get('view') === 'customer' ? 'customer' : 'cashier');
            }, []);
            if (!view) return null;
            return view === 'customer' ? <CustomerView /> : <CashierApp />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
