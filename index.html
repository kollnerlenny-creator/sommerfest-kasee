<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sommerfest Kasse - Premium Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.92);
            --fest-orange: #f97316;
            --sky-blue: #0ea5e9;
            --success-green: #22c55e;
            --error-red: #ef4444;
        }

        body { 
            font-family: 'Fredoka', sans-serif;
            background: #fff;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .bg-summer {
            background-color: #fff7ed;
            background-image: 
                radial-gradient(at 0% 0%, #ffedd5 0, transparent 50%), 
                radial-gradient(at 100% 100%, #bae6fd 0, transparent 50%);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 25px 60px rgba(0,0,0,0.06);
        }

        .success-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .check-svg { width: 90px; height: 90px; }

        .path-tick {
            fill: none;
            stroke: white;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawTick 1.5s ease-out 0.4s forwards;
        }

        @keyframes drawTick { to { stroke-dashoffset: 0; } }

        .sun-ray {
            position: absolute;
            top: 50%; left: 50%;
            width: 350%; height: 350%;
            background: conic-gradient(from 0deg, transparent, rgba(251, 191, 36, 0.1), transparent 30deg);
            transform: translate(-50%, -50%);
            animation: rotateSun 40s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateSun { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .pop-in { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .pulse-soft { animation: pulseSoft 2s infinite; }
        @keyframes pulseSoft { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .apple-button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .apple-button:active { transform: scale(0.92); opacity: 0.85; }
        
        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 bg-summer">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
  apiKey: "AIzaSyCTMGml_KKj1wjmtzTJNubWyMvSaPU3cB8",
  authDomain: "sommerfest-kasse.firebaseapp.com",
  projectId: "sommerfest-kasse",
  storageBucket: "sommerfest-kasse.firebasestorage.app",
  messagingSenderId: "899854905140",
  appId: "1:899854905140:web:94be886a048356c7fb3f61"
};
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const { useState, useEffect, useRef, useMemo } = React;

        const formatCurrency = (amount) => new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(amount);

        const Icon = ({ name, color = "currentColor", size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/([A-Z])/g, '-$1').toLowerCase();
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', iconName);
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { stroke: color, 'stroke-width': 2.5, width: size, height: size },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, color, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const TokenIcon = ({ size = 100, color = "#f97316", className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 100 100" className={className}>
                {/* Essensmarke Form mit Zacken an den Seiten */}
                <path 
                    d="M10,25 Q10,20 15,20 L85,20 Q90,20 90,25 L90,35 Q85,40 90,45 L90,55 Q85,60 90,65 L90,75 Q90,80 85,80 L15,80 Q10,80 10,75 L10,65 Q15,60 10,55 L10,45 Q15,40 10,35 Z" 
                    fill={color} 
                    fillOpacity="0.1" 
                    stroke={color} 
                    strokeWidth="3" 
                />
                <line x1="30" y1="20" x2="30" y2="80" stroke={color} strokeWidth="2" strokeDasharray="4 4" opacity="0.5" />
                <text x="60" y="58" textAnchor="middle" fontSize="24" fontWeight="bold" fill={color} style={{fontFamily: 'Fredoka'}}>M</text>
            </svg>
        );

        const getJournalCol = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('journal');
        const getSettingsDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('settings');
        const getDisplayDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('display_state');

        // --- CASHIER VIEW ---
        function CashierApp({ user }) {
            const [tokenPrice, setTokenPrice] = useState(0.50);
            const [quantity, setQuantity] = useState(0);
            const [givenStr, setGivenStr] = useState("");
            const [showSettings, setShowSettings] = useState(false);
            const [showJournal, setShowJournal] = useState(false);
            const [tempPrice, setTempPrice] = useState("0.50");
            const [transactions, setTransactions] = useState([]);

            useEffect(() => {
                if (!user) return;
                const unsubSettings = getSettingsDoc().onSnapshot(doc => {
                    if (doc.exists && doc.data().tokenPrice) {
                        setTokenPrice(doc.data().tokenPrice);
                        setTempPrice(doc.data().tokenPrice.toString());
                    }
                });

                const unsubJournal = getJournalCol().onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setTransactions(data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                });

                return () => { unsubSettings(); unsubJournal(); };
            }, [user]);

            const total = quantity * tokenPrice;
            const given = parseFloat(givenStr.replace(',', '.')) || 0;
            const change = given > 0 ? Math.max(0, given - total) : 0;

            const cashInDrawer = useMemo(() => {
                return transactions.reduce((acc, curr) => acc + (curr.amount || 0), 0);
            }, [transactions]);

            useEffect(() => {
                if (!user) return;
                getDisplayDoc().set({
                    quantity, total, given, change,
                    status: quantity > 0 ? 'active' : 'idle',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            }, [quantity, total, given, change, user]);

            const handleAction = async (type) => {
                if (!user || quantity === 0) return;
                const amount = type === 'sale' ? total : -total;
                const q = type === 'sale' ? quantity : -quantity;
                
                try {
                    await getJournalCol().add({ 
                        type, quantity: q, amount, 
                        timestamp: new Date().toISOString() 
                    });
                    await getDisplayDoc().set({
                        status: 'success', type, quantity, total, change,
                        given: given > 0 ? given : total,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        trigger: Math.random()
                    });
                    setQuantity(0); setGivenStr("");
                } catch (e) { console.error(e); }
            };

            const deleteTransaction = async (id) => {
                try {
                    await getJournalCol().doc(id).delete();
                } catch (e) { console.error(e); }
            };

            const saveSettings = async () => {
                const p = parseFloat(tempPrice.replace(',', '.'));
                if (!isNaN(p)) {
                    await getSettingsDoc().set({ tokenPrice: p }, { merge: true });
                    setShowSettings(false);
                }
            };

            return (
                <div className="h-screen w-screen p-6 flex flex-col gap-6 bg-summer relative z-10">
                    <header className="flex justify-between items-center glass-card p-5 rounded-[2.5rem]">
                        <div className="flex items-center gap-4">
                            <div className="p-3 bg-orange-500 rounded-2xl text-white shadow-lg">
                                <Icon name="Sun" size={28} />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-800 leading-none mb-1">Sommerfest Kasse</h1>
                                <span className="text-sm font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">Kasse: {formatCurrency(cashInDrawer)}</span>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setShowJournal(true)} className="glass-card p-4 rounded-2xl text-slate-500 apple-button flex items-center gap-2">
                                <Icon name="History" />
                                <span className="font-bold hidden md:inline">Verlauf</span>
                            </button>
                            <button onClick={() => window.open(window.location.href + (window.location.search ? '&view=customer' : '?view=customer'), '_blank')} className="glass-card p-4 rounded-2xl text-sky-500 apple-button">
                                <Icon name="Tv" />
                            </button>
                            <button onClick={() => setShowSettings(true)} className="glass-card p-4 rounded-2xl text-slate-500 apple-button">
                                <Icon name="Settings" />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 grid grid-cols-12 gap-6 min-h-0">
                        <div className="col-span-7 glass-card rounded-[3.5rem] p-10 flex flex-col items-center justify-center relative">
                            {/* Schnellauswahl Buttons */}
                            <div className="flex gap-4 mb-8">
                                {[5, 10, 15, 20].map(n => (
                                    <button 
                                        key={n} 
                                        onClick={() => setQuantity(n)} 
                                        className="px-6 py-3 rounded-2xl bg-orange-100 text-orange-600 font-bold text-xl apple-button border-2 border-orange-200"
                                    >
                                        {n} Stk.
                                    </button>
                                ))}
                            </div>

                            <div className="text-[12rem] font-black leading-none text-slate-900 mb-2 tabular-nums">{quantity}</div>
                            <p className="text-2xl font-bold text-slate-300 uppercase tracking-[0.5em] mb-10">Marken</p>
                            
                            <div className="flex gap-10 items-center">
                                <button onClick={() => setQuantity(q => Math.max(0, q-1))} className="w-24 h-24 glass-card rounded-full apple-button text-orange-500 flex items-center justify-center">
                                    <Icon name="Minus" size={40} />
                                </button>
                                <div className="glass-card px-16 py-8 rounded-[3rem] bg-white/80 min-w-[280px] text-center">
                                    <span className="text-6xl font-black text-orange-500">{formatCurrency(total)}</span>
                                </div>
                                <button onClick={() => setQuantity(q => q+1)} className="w-24 h-24 bg-orange-500 text-white rounded-full apple-button shadow-2xl flex items-center justify-center">
                                    <Icon name="Plus" size={40} />
                                </button>
                            </div>
                        </div>

                        <div className="col-span-5 flex flex-col gap-6 min-h-0">
                            <div className="glass-card rounded-[3rem] p-8 flex-1 flex flex-col">
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <div className="bg-white/60 p-5 rounded-3xl border border-white">
                                        <span className="text-xs font-bold text-slate-400 uppercase block mb-1">Gegeben</span>
                                        <span className="text-3xl font-black text-slate-700">{formatCurrency(given)}</span>
                                    </div>
                                    <div className="bg-green-50/60 p-5 rounded-3xl border border-green-100">
                                        <span className="text-xs font-bold text-green-500 uppercase block mb-1">Rückgeld</span>
                                        <span className="text-3xl font-black text-green-600">{formatCurrency(change)}</span>
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-4 gap-3 flex-1">
                                    {['1','2','3','5€','4','5','6','10€','7','8','9','20€',',','0','C','50€'].map(k => (
                                        <button key={k} onClick={() => {
                                            if(k==='C') setGivenStr("");
                                            else if(k.includes('€')) setGivenStr(k.replace('€',''));
                                            else setGivenStr(s => s+k);
                                        }} className="glass-card rounded-2xl text-2xl font-bold apple-button hover:bg-white flex items-center justify-center tabular-nums">{k}</button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex flex-col gap-3">
                                <button onClick={() => handleAction('sale')} disabled={quantity === 0} className="w-full bg-slate-900 text-white py-8 rounded-[2.5rem] text-4xl font-black apple-button shadow-xl disabled:opacity-20">
                                    BEZAHLT
                                </button>
                                <button onClick={() => handleAction('return')} disabled={quantity === 0} className="w-full bg-white text-rose-500 border-2 border-rose-100 py-4 rounded-2xl text-xl font-bold apple-button disabled:opacity-20">
                                    STORNO / RETOURE
                                </button>
                            </div>
                        </div>
                    </main>

                    {/* Copyright Hinweis Verkäufer Display */}
                    <footer className="mt-auto pt-4 text-center text-slate-400 text-xs font-medium uppercase tracking-widest opacity-60">
                        © Programmiert von Lenny Köllner
                    </footer>

                    {showSettings && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 modal-overlay">
                            <div className="glass-card w-full max-w-md rounded-[3rem] p-10 pop-in">
                                <h2 className="text-3xl font-black mb-8 text-center">Einstellungen</h2>
                                <div className="mb-8">
                                    <label className="block text-sm font-bold text-slate-400 uppercase mb-3">Preis pro Marke (€)</label>
                                    <input 
                                        type="text" 
                                        value={tempPrice}
                                        onChange={(e) => setTempPrice(e.target.value)}
                                        className="w-full bg-slate-50 border-2 border-slate-100 p-6 rounded-3xl text-3xl font-black focus:outline-none focus:border-orange-500"
                                        placeholder="0.50"
                                    />
                                </div>
                                <div className="flex flex-col gap-3">
                                    <button onClick={saveSettings} className="w-full bg-orange-500 text-white py-6 rounded-[2rem] text-2xl font-black apple-button">SPEICHERN</button>
                                    <button onClick={() => setShowSettings(false)} className="w-full py-4 text-slate-400 font-bold apple-button">ABBRECHEN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showJournal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 modal-overlay">
                            <div className="glass-card w-full max-w-2xl h-[80vh] rounded-[3rem] flex flex-col pop-in overflow-hidden">
                                <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-white/50">
                                    <div>
                                        <h2 className="text-3xl font-black">Journal</h2>
                                        <p className="text-green-600 font-bold">Kassenstand: {formatCurrency(cashInDrawer)}</p>
                                    </div>
                                    <button onClick={() => setShowJournal(false)} className="p-4 rounded-full glass-card apple-button">
                                        <Icon name="X" />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                                    <div className="flex flex-col gap-3">
                                        {transactions.length === 0 ? (
                                            <div className="text-center py-20 text-slate-400 font-bold italic">Noch keine Verkäufe...</div>
                                        ) : (
                                            transactions.map(t => (
                                                <div key={t.id} className={`p-5 rounded-3xl flex justify-between items-center ${t.type === 'return' ? 'bg-rose-50 border border-rose-100' : 'bg-white border border-slate-100'} group relative`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`p-3 rounded-2xl ${t.type === 'return' ? 'bg-rose-500 text-white' : 'bg-slate-100 text-slate-500'}`}>
                                                            <Icon name={t.type === 'return' ? 'Undo2' : 'ShoppingBag'} size={20} />
                                                        </div>
                                                        <div>
                                                            <span className="font-black text-lg">{t.quantity} Marken</span>
                                                            <span className="block text-xs font-bold text-slate-400 uppercase">{new Date(t.timestamp).toLocaleTimeString('de-DE')} Uhr</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-6">
                                                        <div className={`text-xl font-black tabular-nums ${t.type === 'return' ? 'text-rose-500' : 'text-slate-800'}`}>
                                                            {t.type === 'return' ? '-' : ''}{formatCurrency(Math.abs(t.amount))}
                                                        </div>
                                                        <button 
                                                            onClick={() => deleteTransaction(t.id)}
                                                            className="p-3 text-rose-300 hover:text-rose-600 hover:bg-rose-100 rounded-xl transition-colors apple-button"
                                                        >
                                                            <Icon name="Trash2" size={20} />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- SUCCESS SCREEN ---
        const SuccessScreen = ({ state, onFinish }) => {
            const isReturn = state.type === 'return';
            useEffect(() => {
                const timer = setTimeout(onFinish, 5000); 
                return () => clearTimeout(timer);
            }, [onFinish]);

            return (
                <div className="h-screen w-screen flex flex-col items-center justify-center p-10 bg-summer text-center overflow-hidden relative">
                    <div className="sun-ray"></div>
                    <div className="success-circle" style={{backgroundColor: isReturn ? '#ef4444' : '#22c55e'}}>
                        <svg className="check-svg" viewBox="0 0 50 50">
                            {isReturn 
                                ? <path className="path-tick" d="M15 15L35 35M35 15L15 35" /> 
                                : <path className="path-tick" d="M10 25L20 35L40 15" />
                            }
                        </svg>
                    </div>
                    <h1 className="text-[8rem] font-black text-slate-800 mb-12 tracking-tighter pop-in" style={{animationDelay: '0.2s'}}>
                        {isReturn ? 'Storniert' : 'Vielen Dank!'}
                    </h1>
                    
                    {!isReturn && (
                        <div className="flex flex-col gap-6 items-center pop-in" style={{animationDelay: '0.4s'}}>
                            <div className="flex gap-8">
                                <div className="glass-card p-10 rounded-[3rem] min-w-[280px]">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-[0.2em] block mb-2">Gegeben</span>
                                    <span className="text-5xl font-black text-slate-700 tabular-nums">{formatCurrency(state.given)}</span>
                                </div>
                                {state.change > 0 && (
                                    <div className="glass-card p-10 px-16 rounded-[3rem] min-w-[320px] border-green-200">
                                        <span className="text-xs font-bold text-green-500 uppercase tracking-[0.2em] block mb-2">Rückgeld</span>
                                        <span className="text-7xl font-black text-green-600 tabular-nums">{formatCurrency(state.change)}</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <footer className="absolute bottom-8 left-0 right-0 text-slate-400 text-sm font-medium uppercase tracking-widest opacity-60">
                        Programmiert von Lenny Köllner
                    </footer>
                </div>
            );
        };

        // --- CUSTOMER VIEW ---
        function CustomerView({ user }) {
            const [state, setState] = useState({ status: 'idle' });
            const lockUntil = useRef(0);

            useEffect(() => {
                if (!user) return;
                const unsub = getDisplayDoc().onSnapshot(doc => {
                    if (!doc.exists) return;
                    const data = doc.data();
                    if (Date.now() < lockUntil.current && data.status === 'idle') return;
                    if (data.status === 'success') lockUntil.current = Date.now() + 5000;
                    setState(data);
                });
                return () => unsub();
            }, [user]);

            const handleFinish = () => {
                lockUntil.current = 0;
                setState({ status: 'idle' });
            };

            if (state.status === 'success') return <SuccessScreen state={state} onFinish={handleFinish} />;
            
            if (state.status === 'active') {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-summer p-10 relative overflow-hidden">
                        <div className="sun-ray opacity-20"></div>
                        
                        {/* Animiertes Hintergrund-Icon */}
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10 floating">
                            <TokenIcon size={600} />
                        </div>

                        <div className="w-full max-w-5xl glass-card rounded-[6rem] p-24 text-center pop-in relative z-10 flex flex-col items-center">
                            <div className="relative mb-6">
                                <span className="text-[20rem] font-black leading-none text-slate-900 block tabular-nums animate-bounce-slow">
                                    {state.quantity}
                                </span>
                                <TokenIcon size={120} className="absolute -top-10 -right-20 floating text-orange-400 opacity-80" />
                            </div>
                            
                            <span className="text-4xl font-bold text-slate-300 uppercase tracking-[1em] block mb-20">Marken</span>
                            
                            <div className="grid grid-cols-3 gap-8 w-full px-10 border-t-2 pt-16 border-slate-50">
                                <div className="text-left pop-in" style={{animationDelay: '0.2s'}}>
                                    <span className="text-sm font-bold text-slate-400 uppercase block mb-2 tracking-widest">Summe</span>
                                    <span className="text-7xl font-black tabular-nums">{formatCurrency(state.total)}</span>
                                </div>
                                <div className="text-center pop-in" style={{animationDelay: '0.4s'}}>
                                    <span className="text-sm font-bold text-slate-400 uppercase block mb-2 tracking-widest">Gegeben</span>
                                    <span className={`text-7xl font-black tabular-nums transition-colors duration-500 ${state.given > 0 ? 'text-sky-500' : 'text-slate-200'}`}>
                                        {state.given > 0 ? formatCurrency(state.given) : '—'}
                                    </span>
                                </div>
                                <div className="text-right pop-in" style={{animationDelay: '0.6s'}}>
                                    <span className="text-sm font-bold text-green-500 uppercase block mb-2 tracking-widest">Rückgeld</span>
                                    <span className={`text-7xl font-black tabular-nums transition-all duration-500 ${state.change > 0 ? 'text-green-600 scale-110' : 'text-slate-200'}`}>
                                        {state.change > 0 ? formatCurrency(state.change) : formatCurrency(0)}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <footer className="absolute bottom-8 left-0 right-0 text-center text-slate-400 text-sm font-medium uppercase tracking-widest opacity-60">
                            Programmiert von Lenny Köllner
                        </footer>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-summer flex flex-col items-center justify-center text-center p-10 overflow-hidden relative">
                    <div className="sun-ray"></div>
                    <div className="mb-16 p-16 glass-card rounded-[6rem] bg-white shadow-2xl z-10 floating">
                        <Icon name="Sun" size={180} color="#f97316" className="pulse-soft" />
                    </div>
                    <h1 className="text-[12rem] font-black tracking-tighter text-slate-900 leading-none mb-6 z-10 pop-in">Sommerfest</h1>
                    <p className="text-5xl font-medium tracking-[2rem] text-slate-300 uppercase z-10 pop-in" style={{animationDelay:'0.3s'}}>Herzlich Willkommen</p>
                    
                    <footer className="absolute bottom-12 left-0 right-0 text-slate-400 text-lg font-medium uppercase tracking-[1rem] opacity-40">
                        Programmiert von Lenny Köllner
                    </footer>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState(null);
            const [user, setUser] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error(e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                const params = new URLSearchParams(window.location.search);
                setView(params.get('view') === 'customer' ? 'customer' : 'cashier');
                return () => unsubscribe();
            }, []);

            if (!view || !user) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-orange-50 text-orange-500 gap-6">
                        <div className="animate-spin text-6xl">
                            <Icon name="Loader2" size={64} />
                        </div>
                        <span className="text-3xl font-black">Wird geladen...</span>
                    </div>
                );
            }

            return view === 'customer' ? <CustomerView user={user} /> : <CashierApp user={user} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
