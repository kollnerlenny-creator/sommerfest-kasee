<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sommerfest Kasse - Cloud Sync</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@400;600;900&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.7);
            --fest-orange: #f97316;
            --success-green: #22c55e;
            --return-red: #ef4444;
        }

        body { 
            font-family: 'SF Pro Display', 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
        }

        .bg-mesh {
            background-color: #fffaf0;
            background-image: 
                radial-gradient(at 0% 0%, hsla(35,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 50% 10%, hsla(45,100%,94%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(25,100%,95%,1) 0, transparent 50%);
        }

        .success-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            animation: circleExpand 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 25px 50px -12px rgba(34, 197, 94, 0.4);
        }

        .check-icon-svg {
            width: 75px;
            height: 75px;
            stroke: white;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Extrem verlangsamte Pfad-Animationen */
        .path-check {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawPath 15s linear 0.5s forwards;
        }

        .path-return {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawPath 15s linear 0.5s forwards;
        }

        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }

        @keyframes circleExpand {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confettiFall 8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes confettiFall {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
        }

        .pop-in { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .sun-ray {
            position: absolute;
            top: 50%; left: 50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(250, 204, 21, 0.1), transparent 30deg);
            transform: translate(-50%, -50%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body class="text-slate-900 bg-mesh">
    <div id="root"></div>

    <script type="text/babel">
       const firebaseConfig = {
  apiKey: "AIzaSyCTMGml_KKj1wjmtzTJNubWyMvSaPU3cB8",
  authDomain: "sommerfest-kasse.firebaseapp.com",
  projectId: "sommerfest-kasse",
  storageBucket: "sommerfest-kasse.firebasestorage.app",
  messagingSenderId: "899854905140",
  appId: "1:899854905140:web:94be886a048356c7fb3f61"
};
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const { useState, useEffect, useMemo, useRef } = React;

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(amount);
        };

        const Icon = ({ name, color = "currentColor", size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1).replace(/([A-Z])/g, '-$1').toLowerCase();
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', iconName);
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { stroke: color, 'stroke-width': 2, width: size, height: size },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, color, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const getJournalCol = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('journal');
        const getSettingsDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('settings');
        const getDisplayDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('display_state');

        function CashierApp() {
            const [user, setUser] = useState(null);
            const [tokenPrice, setTokenPrice] = useState(0.50);
            const [quantity, setQuantity] = useState(0);
            const [givenCashStr, setGivenCashStr] = useState("");
            const [journal, setJournal] = useState([]);
            const autoResetTimer = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubSettings = getSettingsDoc().onSnapshot((doc) => {
                    if (doc.exists && doc.data().tokenPrice) setTokenPrice(doc.data().tokenPrice);
                });
                return () => unsubSettings();
            }, [user]);

            const total = quantity * tokenPrice;
            const given = parseFloat(givenCashStr.replace(',', '.')) || 0;
            const change = given > 0 ? Math.max(0, given - total) : 0;

            useEffect(() => {
                if (!user || quantity < 0) return;
                const sync = async () => {
                    try {
                        await getDisplayDoc().set({
                            quantity, total, given, 
                            status: quantity > 0 ? 'active' : 'idle',
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                    } catch (e) { console.error(e); }
                };
                sync();
            }, [quantity, total, given, user]);

            const handleCheckout = async (type = 'sale') => {
                if (!user || quantity === 0) return;
                const amount = type === 'sale' ? total : -total;
                const qty = type === 'sale' ? quantity : -quantity;
                try {
                    await getJournalCol().add({ type, quantity: qty, amount, timestamp: new Date().toISOString() });
                    
                    await getDisplayDoc().set({ 
                        status: 'success', type, quantity, total, 
                        change: type === 'sale' ? change : 0, 
                        given: given > 0 ? given : total,
                        lastSuccessId: Math.random().toString(36).substring(7), // Force refresh
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setQuantity(0); setGivenCashStr("");
                } catch (e) { console.error(e); }
            };

            return (
                <div className="h-screen w-screen p-8 flex flex-col gap-4 bg-mesh overflow-hidden">
                    <header className="flex justify-between items-center px-4 shrink-0 z-10">
                        <h1 className="text-xl font-black text-slate-800">Kasse</h1>
                    </header>
                    <main className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-6 min-h-0 z-10">
                        <div className="glass-card rounded-[3rem] p-8 flex flex-col items-center justify-center">
                            <div className="text-[10rem] font-black tabular-nums text-slate-900">{quantity}</div>
                            <div className="flex gap-6 items-center">
                                <button onClick={() => setQuantity(q => Math.max(0, q-1))} className="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-md text-orange-500 font-bold text-4xl">-</button>
                                <div className="text-5xl font-black text-orange-500">{formatCurrency(total)}</div>
                                <button onClick={() => setQuantity(q => q+1)} className="w-20 h-20 bg-orange-500 text-white rounded-full flex items-center justify-center shadow-2xl font-bold text-4xl">+</button>
                            </div>
                        </div>
                        <div className="glass-card rounded-[3rem] p-8 flex flex-col">
                           <div className="grid grid-cols-4 gap-3 flex-1">
                                {['1','2','3','C','4','5','6','5€','7','8','9','10€',',','0','20€','50€'].map((k) => (
                                    <button key={k} onClick={() => {
                                        if (k === 'C') setGivenCashStr("");
                                        else if (k.includes('€')) setGivenCashStr(k.replace('€',''));
                                        else setGivenCashStr(s => s + k);
                                    }} className="bg-white rounded-2xl font-bold text-2xl shadow-sm">{k}</button>
                                ))}
                            </div>
                            <button onClick={() => handleCheckout('sale')} disabled={quantity === 0} className="mt-6 w-full bg-slate-900 text-white py-8 rounded-[2rem] font-black text-2xl disabled:opacity-20">BEZAHLT</button>
                        </div>
                    </main>
                </div>
            );
        }

        const SuccessScreen = ({ state, onFinish }) => {
            const isReturn = state.type === 'return';
            const [confetti, setConfetti] = useState([]);
            
            useEffect(() => {
                if (!isReturn) {
                    setConfetti(Array.from({ length: 40 }).map((_, i) => ({
                        id: i, tx: (Math.random() - 0.5) * 800 + 'px', ty: (Math.random() - 0.5) * 800 + 'px',
                        color: ['#facc15', '#fb923c', '#fde68a'][Math.floor(Math.random() * 3)]
                    })));
                }
                // Lokaler Timer: Nach 20 Sekunden kehren wir zum Idle-Screen zurück
                const timer = setTimeout(onFinish, 20000);
                return () => clearTimeout(timer);
            }, [isReturn, onFinish]);

            return (
                <div className="h-screen w-screen flex flex-col items-center justify-center p-10 bg-mesh overflow-hidden text-center">
                    {confetti.map(c => <div key={c.id} className="confetti" style={{'--tx': c.tx, '--ty': c.ty, backgroundColor: c.color, left: '50%', top: '50%'}}></div>)}
                    <div className="success-circle" style={{backgroundColor: isReturn ? '#ef4444' : '#22c55e'}}>
                        <svg className="check-icon-svg" viewBox="0 0 50 50">
                            {isReturn 
                                ? <path className="path-return" d="M15 15L35 35M35 15L15 35" /> 
                                : <path className="path-check" d="M10 25L20 35L40 15" />
                            }
                        </svg>
                    </div>
                    <h1 className="text-7xl font-black text-slate-800 mb-4 pop-in">Vielen Dank!</h1>
                    <div className="flex gap-6 mt-8">
                        <div className="glass-card p-8 rounded-[2.5rem] bg-white min-w-[200px]">
                            <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Gegeben</p>
                            <p className="text-3xl font-black text-slate-700">{formatCurrency(state.given)}</p>
                        </div>
                        {state.change > 0 && (
                            <div className="glass-card p-8 rounded-[2.5rem] bg-white min-w-[200px]">
                                <p className="text-xs font-bold text-green-500 uppercase tracking-widest">Rückgeld</p>
                                <p className="text-5xl font-black text-green-600">{formatCurrency(state.change)}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function CustomerView() {
            const [state, setState] = useState({ status: 'idle' });
            const [user, setUser] = useState(null);
            const lockUntil = useRef(0);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else { await auth.signInAnonymously(); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = getDisplayDoc().onSnapshot((doc) => { 
                    if (!doc.exists) return;
                    const newData = doc.data();
                    
                    // SCHUTZ-LOGIK: Wenn wir gerade im Erfolgs-Modus sind, 
                    // ignorieren wir Reset-Befehle (Idle) für 15 Sekunden.
                    if (Date.now() < lockUntil.current && newData.status === 'idle') {
                        return; 
                    }

                    if (newData.status === 'success') {
                        lockUntil.current = Date.now() + 15000; // 15 Sek Sperre gegen Resets
                    }
                    
                    setState(newData);
                });
                return () => unsub();
            }, [user]);

            const finishSuccess = () => {
                lockUntil.current = 0;
                setState({ status: 'idle' });
            };

            if (state.status === 'success') return <SuccessScreen state={state} onFinish={finishSuccess} />;
            
            if (state.status === 'active') {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center p-10 bg-mesh overflow-hidden">
                        <div className="w-full max-w-xl glass-card rounded-[4rem] p-16 pop-in text-center">
                            <span className="text-[12rem] font-black leading-none text-slate-900 block">{state.quantity}</span>
                            <span className="text-2xl text-slate-300 font-black uppercase tracking-[0.6em] mb-12 block">Wertmarken</span>
                            <div className="grid grid-cols-2 gap-8 w-full border-t border-slate-100 pt-10">
                                <div>
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Summe</span>
                                    <span className="text-4xl font-black text-slate-900">{formatCurrency(state.total)}</span>
                                </div>
                                <div>
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Gegeben</span>
                                    <span className="text-4xl font-black text-blue-600">{state.given > 0 ? formatCurrency(state.given) : "—"}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-mesh flex flex-col items-center justify-center text-center p-10 overflow-hidden">
                    <div className="sun-ray opacity-20"></div>
                    <Icon name="Sun" size={120} color="#f97316" className="mb-8" />
                    <h1 className="text-[8rem] font-black tracking-tighter text-slate-900 mb-6 pop-in">Sommerfest</h1>
                    <p className="text-2xl font-medium tracking-[0.8rem] text-slate-300 uppercase">Willkommen am Stand</p>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState(null);
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                setView(params.get('view') === 'customer' ? 'customer' : 'cashier');
            }, []);
            if (!view) return null;
            return view === 'customer' ? <CustomerView /> : <CashierApp />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
