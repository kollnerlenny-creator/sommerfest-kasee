<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sommerfest Kasse - Final Fix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Inter:wght@400;600;900&display=swap');
        
        :root {
            --fest-orange: #f97316;
            --success-green: #22c55e;
            --summer-yellow: #facc15;
        }

        body { 
            font-family: 'SF Pro Display', 'Inter', sans-serif;
            background: #fffaf0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* Sommerlicher Hintergrund */
        .bg-mesh {
            background-color: #fffaf0;
            background-image: 
                radial-gradient(at 0% 0%, hsla(35,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(45,100%,94%,1) 0, transparent 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* --- FIX: Die Check-Animation --- */
        .success-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            animation: circleScale 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 20px 40px -10px rgba(34, 197, 94, 0.4);
        }

        .check-icon-svg {
            width: 70px;
            height: 70px;
            stroke: white;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            /* Verlangsamte Zeichnung: 1.5s */
            animation: checkDraw 1.5s ease-out 0.5s forwards;
        }

        @keyframes circleScale {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes checkDraw {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        /* Partikel-Effekte */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fly 3s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .floating {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .apple-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-button:active {
            transform: scale(0.95);
        }

        .sun-ray {
            position: absolute;
            top: 50%; left: 50%;
            width: 200vw; height: 200vw;
            background: conic-gradient(from 0deg, transparent, rgba(250, 204, 21, 0.05), transparent 40deg);
            animation: rotateSun 40s linear infinite;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        @keyframes rotateSun { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body class="bg-mesh">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
  apiKey: "AIzaSyCTMGml_KKj1wjmtzTJNubWyMvSaPU3cB8",
  authDomain: "sommerfest-kasse.firebaseapp.com",
  projectId: "sommerfest-kasse",
  storageBucket: "sommerfest-kasse.firebasestorage.app",
  messagingSenderId: "899854905140",
  appId: "1:899854905140:web:94be886a048356c7fb3f61"
};
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const { useState, useEffect, useMemo, useRef } = React;

        const formatCurrency = (val) => new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(val);

        const Icon = ({ name, color = "currentColor", size = 24 }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name.toLowerCase());
                    ref.current.appendChild(i);
                    window.lucide.createIcons({ attrs: { stroke: color, 'stroke-width': 2, width: size, height: size } });
                }
            }, [name, color, size]);
            return <span ref={ref} className="inline-flex items-center"></span>;
        };

        const getDisplayDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('display_state');
        const getJournalCol = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('journal');
        const getSettingsDoc = () => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('settings');

        // --- CASHIER APP ---
        function CashierApp() {
            const [user, setUser] = useState(null);
            const [quantity, setQuantity] = useState(0);
            const [givenCashStr, setGivenCashStr] = useState("");
            const [tokenPrice, setTokenPrice] = useState(0.5);
            
            useEffect(() => {
                const init = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                    else await auth.signInAnonymously();
                };
                init();
                auth.onAuthStateChanged(setUser);
                getSettingsDoc().onSnapshot(d => d.exists && setTokenPrice(d.data().tokenPrice));
            }, []);

            const total = quantity * tokenPrice;
            const given = parseFloat(givenCashStr.replace(',', '.')) || 0;
            const change = Math.max(0, given - total);

            useEffect(() => {
                if (!user) return;
                getDisplayDoc().set({
                    quantity, total, given, 
                    status: quantity > 0 ? 'active' : 'idle',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            }, [quantity, total, given, user]);

            const handleCheckout = async (type) => {
                if (quantity === 0) return;
                const entry = { type, quantity: type === 'sale' ? quantity : -quantity, amount: type === 'sale' ? total : -total, timestamp: new Date().toISOString() };
                await getJournalCol().add(entry);
                await getDisplayDoc().set({ 
                    status: 'success', type, quantity, total, change, given: given || total,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setQuantity(0); setGivenCashStr("");
                // Langer Reset (20 Sek), damit Animation nicht unterbrochen wird
                setTimeout(() => getDisplayDoc().update({ status: 'idle' }), 20000);
            };

            return (
                <div className="h-screen flex flex-col p-6 gap-6 relative">
                    <div className="sun-ray"></div>
                    <header className="flex justify-between items-center z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center shadow-lg"><Icon name="Sun" color="white" size={20} /></div>
                            <h1 className="text-lg font-black text-slate-800">Kasse</h1>
                        </div>
                    </header>
                    <main className="flex-1 grid grid-cols-12 gap-6 z-10">
                        <div className="col-span-7 glass-card rounded-[2.5rem] p-10 flex flex-col items-center justify-center">
                            <div className="text-[8rem] font-black leading-none">{quantity}</div>
                            <div className="text-4xl font-bold text-orange-500 mb-10">{formatCurrency(total)}</div>
                            <div className="flex gap-4">
                                <button onClick={() => setQuantity(q => Math.max(0, q-1))} className="w-16 h-16 glass-card rounded-full flex items-center justify-center apple-button"><Icon name="Minus" color="#f97316" /></button>
                                <button onClick={() => setQuantity(q => q+1)} className="w-16 h-16 bg-orange-500 text-white rounded-full flex items-center justify-center apple-button shadow-lg"><Icon name="Plus" /></button>
                            </div>
                        </div>
                        <div className="col-span-5 flex flex-col gap-6">
                            <div className="glass-card p-6 rounded-3xl grid grid-cols-2 gap-4">
                                <div><p className="text-[10px] font-bold text-slate-400 uppercase">Gegeben</p><p className="text-2xl font-black">{formatCurrency(given)}</p></div>
                                <div><p className="text-[10px] font-bold text-green-500 uppercase">Rückgeld</p><p className="text-2xl font-black text-green-500">{formatCurrency(change)}</p></div>
                            </div>
                            <div className="flex-1 grid grid-cols-4 gap-2">
                                {['1','2','3','C','4','5','6','10€','7','8','9','20€',',','0','+10','50€'].map(k => (
                                    <button key={k} onClick={() => {
                                        if(k==='C') setGivenCashStr("");
                                        else if(k==='+10') setQuantity(q => q+10);
                                        else if(k.includes('€')) setGivenCashStr(k.replace('€',''));
                                        else setGivenCashStr(s => s+k);
                                    }} className="glass-card rounded-2xl font-bold text-xl apple-button">{k}</button>
                                ))}
                            </div>
                            <button onClick={() => handleCheckout('sale')} className="h-24 bg-slate-900 text-white rounded-[2rem] font-black text-2xl apple-button shadow-xl">BEZAHLT</button>
                        </div>
                    </main>
                </div>
            );
        }

        // --- CUSTOMER VIEW ---
        function CustomerView() {
            const [state, setState] = useState({ status: 'idle' });
            const [particles, setParticles] = useState([]);

            useEffect(() => {
                auth.signInAnonymously();
                const unsub = getDisplayDoc().onSnapshot(d => d.exists && setState(d.data()));
                return () => unsub();
            }, []);

            useEffect(() => {
                if (state.status === 'success' && state.type !== 'return') {
                    const p = Array.from({length: 30}).map((_, i) => ({
                        id: i,
                        x: (Math.random() - 0.5) * 600 + 'px',
                        y: (Math.random() - 0.5) * 600 + 'px',
                        color: ['#facc15', '#fb923c', '#22c55e'][Math.floor(Math.random()*3)]
                    }));
                    setParticles(p);
                } else {
                    setParticles([]);
                }
            }, [state.status]);

            if (state.status === 'success') {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-mesh p-10 relative overflow-hidden">
                        <div className="sun-ray"></div>
                        {particles.map(p => (
                            <div key={p.id} className="particle" style={{
                                '--x': p.x, '--y': p.y, backgroundColor: p.color,
                                width: '12px', height: '12px', borderRadius: '50%',
                                left: '50%', top: '50%'
                            }}></div>
                        ))}
                        <div className="success-circle" style={{backgroundColor: state.type === 'return' ? '#ef4444' : '#22c55e'}}>
                            <svg className="check-icon-svg" viewBox="0 0 50 50">
                                {state.type === 'return' ? <path d="M15 15L35 35M35 15L15 35" /> : <path d="M10 25L20 35L40 15" />}
                            </svg>
                        </div>
                        <h1 className="text-7xl font-black text-slate-800 mb-4">{state.type === 'return' ? 'Storno' : 'Fertig!'}</h1>
                        <p className="text-xl text-slate-400 font-semibold mb-12">Viel Spaß beim Sommerfest!</p>
                        
                        <div className="flex gap-6 scale-90">
                            <div className="glass-card p-8 rounded-[2.5rem] text-center min-w-[200px]">
                                <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Gegeben</p>
                                <p className="text-3xl font-black">{formatCurrency(state.given)}</p>
                            </div>
                            {state.change > 0 && (
                                <div className="glass-card p-8 rounded-[2.5rem] text-center min-w-[240px] border-green-200 shadow-xl floating">
                                    <p className="text-[10px] font-bold text-green-500 uppercase mb-1">Ihr Rückgeld</p>
                                    <p className="text-5xl font-black text-green-600">{formatCurrency(state.change)}</p>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (state.status === 'active') {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-mesh p-10">
                        <div className="sun-ray"></div>
                        <div className="w-full max-w-xl glass-card rounded-[4rem] p-16 text-center shadow-2xl relative z-10">
                            <span className="text-orange-400 font-bold tracking-[0.3em] uppercase mb-4 block">Aktuelle Bestellung</span>
                            <div className="text-[12rem] font-black leading-none mb-4 floating">{state.quantity}</div>
                            <span className="text-2xl font-bold text-slate-300 uppercase tracking-[0.5em] mb-12 block">Wertmarken</span>
                            <div className="h-px bg-slate-100 w-full mb-10"></div>
                            <div className="flex justify-around">
                                <div><p className="text-[10px] font-bold text-slate-400 uppercase">Summe</p><p className="text-4xl font-black">{formatCurrency(state.total)}</p></div>
                                <div><p className="text-[10px] font-bold text-slate-400 uppercase">Gegeben</p><p className="text-4xl font-black text-blue-500">{state.given ? formatCurrency(state.given) : '—'}</p></div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen flex flex-col items-center justify-center bg-mesh relative">
                    <div className="sun-ray"></div>
                    <div className="p-12 glass-card rounded-[4rem] mb-12 floating z-10"><Icon name="Sun" size={100} color="#f97316" /></div>
                    <h1 className="text-8xl font-black text-slate-800 tracking-tighter z-10">Sommerfest</h1>
                    <p className="text-2xl font-medium tracking-[0.8rem] text-slate-300 uppercase z-10">Kasse bereit</p>
                </div>
            );
        }

        function App() {
            const [v, setV] = useState(null);
            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                setV(p.get('view') === 'customer' ? 'customer' : 'cashier');
            }, []);
            return v === 'customer' ? <CustomerView /> : v === 'cashier' ? <CashierApp /> : null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
